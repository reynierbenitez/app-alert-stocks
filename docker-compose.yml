services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3050:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FRONTEND_URL=http://localhost:8050
      - DATABASE_PATH=/app/data/alerts.db
      - LOG_LEVEL=info
    volumes:
      - datos_alertas_db:/app/data   # <-- ¡Nombre cambiado aquí!
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8050:8080"
    environment:
      - NGINX_PORT=8080
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  datos_alertas_db:   # <-- ¡Nombre cambiado aquí al final!
