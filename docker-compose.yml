services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3050:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FRONTEND_URL=http://localhost:8050
      - DATABASE_PATH=/app/data/alerts.db
      - LOG_LEVEL=info
    volumes:
      - backend_data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8050:8080"
    environment:
      - NGINX_PORT=8080
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  backend_data:
