version: '3.8'

services:
  backend:
    build: ./backend
    container_name: alert-stocks-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - DATABASE_PATH=/app/data/alerts.db
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Optional: Add WEBHOOK_SECRET for HMAC verification
      # - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    volumes:
      - backend_data:/app/data
      # Mount local .env file if exists (for development)
      - ./backend/.env:/app/.env:ro
    networks:
      - alert-stocks-network
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const options = { host: 'localhost', port: 3000, path: '/health', timeout: 2000 }; const req = http.request(options, (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }); req.on('error', () => process.exit(1)); req.end();"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: alert-stocks-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    environment:
      - NGINX_PORT=8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - alert-stocks-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  backend_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data

networks:
  alert-stocks-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16